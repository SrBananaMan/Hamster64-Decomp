name: Hamster64 (Japanese)
sha1: 436627174830fb9941bd4f25efa6fa1024498a97
options:
  basename: Hamster64
  target_path: baserom.z64
  elf_path: build/Hamster64.elf
  base_path: .
  platform: n64
  compiler: KMC

  # asm_path: asm
  # src_path: src
  # build_path: build
  # create_asm_dependencies: True

  ld_script_path: Hamster64.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: shift_jis
  o_as_suffix: False
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  # section_order: [".text", ".data", ".rodata", ".bss"]
  # auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  # undefined_funcs_auto_path: undefined_funcs_auto.txt
  # undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  # string_encoding: ASCII
  # data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
  # libultra_symbols: True
  # hardware_regs: True
  # gfx_ucode: # one of [f3d, f3db, f3dex, f3dexb, f3dex2]
segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80025C00
    subsegments:
      - [0x1000, hasm]

  - name: main
    type: code
    start: 0x1060
    vram: 0x80025C60
    follows_vram: entry
    bss_size: 0xDE7F0
    subsegments:
      - [0x1060, asm]
      - [0x31150, data]
      - { type: bss, vram: 0x80079E10 }

  - type: bin
    start: 0x55210
    follows_vram: main

  - [0xC00000]
